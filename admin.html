<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - 3D Empreendimentos</title>
    <meta name="robots" content="noindex, nofollow">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #041d29; color: #fafcfb; min-height: 100vh; }
        .login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-box { background: rgba(91,111,120,0.1); border: 1px solid rgba(152,164,166,0.15); border-radius: 16px; padding: 40px; max-width: 400px; width: 90%; text-align: center; }
        .login-box h1 { font-size: 1.5rem; margin-bottom: 8px; }
        .login-box p { color: #98a4a6; font-size: 0.9rem; margin-bottom: 24px; }
        .login-box input { width: 100%; padding: 14px; background: rgba(91,111,120,0.15); border: 1px solid rgba(152,164,166,0.2); border-radius: 8px; color: #fff; font-size: 1rem; text-align: center; outline: none; margin-bottom: 16px; }
        .login-box input:focus { border-color: #5b6f78; }
        .login-box button { width: 100%; padding: 14px; background: #fff; color: #041d29; border: none; border-radius: 8px; font-size: 0.9rem; font-weight: 600; cursor: pointer; }
        .login-box button:hover { background: #fafcfb; }
        .login-error { color: #ef4444; font-size: 0.85rem; margin-top: 8px; display: none; }
        .admin-panel { display: none; padding: 24px; max-width: 1000px; margin: 0 auto; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid rgba(152,164,166,0.15); flex-wrap: wrap; gap: 12px; }
        .admin-header h1 { font-size: 1.3rem; }
        .admin-header-actions { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn { padding: 10px 20px; border-radius: 8px; border: none; font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: #fff; color: #041d29; }
        .btn-primary:hover { background: #fafcfb; transform: translateY(-1px); }
        .btn-danger { background: #ef4444; color: #fff; }
        .btn-danger:hover { background: #dc2626; }
        .btn-secondary { background: rgba(91,111,120,0.2); color: #fafcfb; border: 1px solid rgba(152,164,166,0.2); }
        .btn-success { background: #22c55e; color: #fff; }
        .btn-success:hover { background: #16a34a; }
        .btn-warning { background: #f59e0b; color: #041d29; }
        .btn-sm { padding: 6px 12px; font-size: 0.8rem; }
        .publish-bar { background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.2); border-radius: 12px; padding: 16px 20px; margin-bottom: 24px; display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .publish-bar p { font-size: 0.85rem; color: #98a4a6; }
        .publish-bar .unsaved { color: #f59e0b; font-weight: 500; }
        .imoveis-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }
        .imovel-item { background: rgba(91,111,120,0.1); border: 1px solid rgba(152,164,166,0.1); border-radius: 12px; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
        .imovel-item-info { flex: 1; min-width: 200px; }
        .imovel-item h3 { font-size: 0.9rem; margin-bottom: 4px; }
        .imovel-item p { color: #98a4a6; font-size: 0.78rem; }
        .status-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.68rem; font-weight: 600; text-transform: uppercase; }
        .status-badge.active { background: rgba(34,197,94,0.15); color: #22c55e; }
        .status-badge.inactive { background: rgba(239,68,68,0.15); color: #ef4444; }
        .imovel-actions { display: flex; gap: 6px; flex-wrap: wrap; }
        .form-section { background: rgba(91,111,120,0.1); border: 1px solid rgba(152,164,166,0.1); border-radius: 12px; padding: 28px; display: none; }
        .form-section.active { display: block; }
        .form-section h2 { font-size: 1.1rem; margin-bottom: 20px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .form-group { margin-bottom: 12px; }
        .form-group.full { grid-column: 1 / -1; }
        .form-group label { display: block; font-size: 0.72rem; color: #98a4a6; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 11px; background: rgba(91,111,120,0.15); border: 1px solid rgba(152,164,166,0.2); border-radius: 8px; color: #fff; font-family: inherit; font-size: 0.88rem; outline: none; }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: #5b6f78; }
        .form-group textarea { min-height: 100px; resize: vertical; }
        .form-group select { appearance: none; cursor: pointer; }
        .form-group select option { background: #041d29; color: #fff; }
        .form-actions { display: flex; gap: 12px; margin-top: 16px; }
        .img-url-list { display: flex; flex-direction: column; gap: 6px; margin-top: 6px; }
        .img-url-row { display: flex; gap: 6px; }
        .img-url-row input { flex: 1; font-size: 0.8rem; padding: 8px; }
        .img-url-row button { padding: 6px 10px; background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); border-radius: 6px; color: #ef4444; cursor: pointer; font-size: 0.7rem; }
        .add-img-btn { margin-top: 6px; padding: 6px 12px; font-size: 0.72rem; background: rgba(91,111,120,0.2); border: 1px solid rgba(152,164,166,0.2); border-radius: 6px; color: #98a4a6; cursor: pointer; }
        .toast { position: fixed; bottom: 24px; right: 24px; padding: 14px 24px; border-radius: 8px; font-size: 0.85rem; font-weight: 500; z-index: 9999; opacity: 0; transform: translateY(20px); transition: 0.3s; }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.success { background: #22c55e; color: #fff; }
        .toast.error { background: #ef4444; color: #fff; }
        .toast.info { background: #3b82f6; color: #fff; }
        @media (max-width: 768px) { .form-grid { grid-template-columns: 1fr; } .imovel-item { flex-direction: column; align-items: flex-start; } }
    </style>
</head>
<body>
    <div class="toast" id="toast"></div>

    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <h1>Painel Admin</h1>
            <p>3D Empreendimentos - Gestão de Imóveis</p>
            <input type="password" id="adminPassword" placeholder="Senha de acesso" autofocus>
            <button onclick="doLogin()">Entrar</button>
            <p class="login-error" id="loginError">Senha incorreta</p>
        </div>
    </div>

    <div class="admin-panel" id="adminPanel">
        <div class="admin-header">
            <h1>Gestão de Imóveis</h1>
            <div class="admin-header-actions">
                <button class="btn btn-primary" onclick="showForm()">+ Novo Imóvel</button>
                <button class="btn btn-secondary" onclick="logout()">Sair</button>
            </div>
        </div>

        <div class="publish-bar" id="publishBar">
            <p id="publishStatus">Tudo publicado ✓</p>
            <div>
                <button class="btn btn-sm btn-success" onclick="publishChanges()">Baixar e Publicar</button>
            </div>
        </div>

        <div class="imoveis-list" id="imoveisList"></div>

        <div class="form-section" id="formSection">
            <h2 id="formTitle">Adicionar Imóvel</h2>
            <div class="form-grid">
                <div class="form-group full"><label>Título</label><input type="text" id="f_titulo" placeholder="Ex: Les Residences de Mônaco - 4 Suítes"></div>
                <div class="form-group"><label>Valor de Venda (R$)</label><input type="text" id="f_valor" placeholder="15.000.000"></div>
                <div class="form-group"><label>Condomínio (R$)</label><input type="text" id="f_condominio" placeholder="8.000"></div>
                <div class="form-group"><label>IPTU (R$/ano)</label><input type="text" id="f_iptu" placeholder="42.000"></div>
                <div class="form-group"><label>Quartos</label><input type="number" id="f_quartos" placeholder="4"></div>
                <div class="form-group"><label>Suítes</label><input type="number" id="f_suites" placeholder="4"></div>
                <div class="form-group"><label>Banheiros</label><input type="number" id="f_banheiros" placeholder="5"></div>
                <div class="form-group"><label>Vagas</label><input type="text" id="f_vagas" placeholder="4 cobertas"></div>
                <div class="form-group"><label>Área (m²)</label><input type="text" id="f_area" placeholder="280"></div>
                <div class="form-group"><label>Tipo</label><select id="f_tipo"><option value="venda">Venda</option><option value="temporada">Temporada</option></select></div>
                <div class="form-group full"><label>Descrição</label><textarea id="f_descricao" placeholder="Descrição completa..."></textarea></div>
                <div class="form-group full">
                    <label>URLs das Imagens</label>
                    <div class="img-url-list" id="imgUrlList"><div class="img-url-row"><input type="text" class="img-url" placeholder="https://..."><button onclick="removeImg(this)">✕</button></div></div>
                    <button class="add-img-btn" onclick="addImageField()">+ Adicionar imagem</button>
                </div>
            </div>
            <div class="form-actions">
                <button class="btn btn-primary" onclick="saveImovel()">Salvar</button>
                <button class="btn btn-danger" onclick="hideForm()">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
    const ADMIN_PASS = 'RJ0001';
    let imoveis = [];
    let editingId = null;
    let hasUnsaved = false;

    document.getElementById('adminPassword').addEventListener('keypress', (e) => { if (e.key === 'Enter') doLogin(); });

    function doLogin() {
        if (document.getElementById('adminPassword').value === ADMIN_PASS) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            loadImoveis();
        } else {
            document.getElementById('loginError').style.display = 'block';
        }
    }

    function logout() {
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('adminPanel').style.display = 'none';
    }

    function showToast(msg, type = 'info') {
        const t = document.getElementById('toast');
        t.textContent = msg; t.className = `toast ${type} show`;
        setTimeout(() => t.classList.remove('show'), 3500);
    }

    async function loadImoveis() {
        // Load from localStorage first (has latest changes), fallback to file
        const saved = localStorage.getItem('imoveis_3d');
        if (saved) {
            imoveis = JSON.parse(saved);
        } else {
            try {
                const res = await fetch('imoveis.json?t=' + Date.now());
                imoveis = await res.json();
                localStorage.setItem('imoveis_3d', JSON.stringify(imoveis));
            } catch(e) { imoveis = []; }
        }
        renderList();
        updatePublishStatus();
    }

    function saveToLocal() {
        localStorage.setItem('imoveis_3d', JSON.stringify(imoveis));
        hasUnsaved = true;
        updatePublishStatus();
    }

    function updatePublishStatus() {
        const el = document.getElementById('publishStatus');
        if (hasUnsaved) {
            el.innerHTML = '<span class="unsaved">⚠ Alterações não publicadas</span>';
        } else {
            el.textContent = 'Tudo publicado ✓';
        }
    }

    function publishChanges() {
        const json = JSON.stringify(imoveis, null, 2);
        const blob = new Blob([json], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'imoveis.json'; a.click();
        URL.revokeObjectURL(url);
        hasUnsaved = false;
        updatePublishStatus();
        showToast('Arquivo baixado! Agora envie-o para o repositório.', 'success');
        // Abre a página do GitHub pra upload
        setTimeout(() => {
            window.open('https://github.com/diogoapolinarioporto-code/3d-empreendimentos-site/upload/master', '_blank');
        }, 1000);
    }

    function renderList() {
        const list = document.getElementById('imoveisList');
        if (imoveis.length === 0) { list.innerHTML = '<p style="color:#98a4a6;text-align:center;padding:30px;">Nenhum imóvel cadastrado</p>'; return; }
        list.innerHTML = imoveis.map((im, i) => `
            <div class="imovel-item">
                <div class="imovel-item-info">
                    <h3>${im.titulo}</h3>
                    <p>R$ ${im.valor_venda} | ${im.quartos} quartos | ${im.tipo || 'venda'}</p>
                    <span class="status-badge ${im.ativo ? 'active' : 'inactive'}">${im.ativo ? 'Ativo' : 'Inativo'}</span>
                </div>
                <div class="imovel-actions">
                    <button class="btn btn-sm ${im.ativo ? 'btn-warning' : 'btn-success'}" onclick="toggleActive(${i})">${im.ativo ? 'Desativar' : 'Ativar'}</button>
                    <button class="btn btn-sm btn-primary" onclick="editImovel(${i})">Editar</button>
                    <button class="btn btn-sm btn-danger" onclick="deleteImovel(${i})">Excluir</button>
                </div>
            </div>
        `).join('');
    }

    function toggleActive(i) { imoveis[i].ativo = !imoveis[i].ativo; renderList(); saveToLocal(); }
    function deleteImovel(i) { if (confirm('Excluir "' + imoveis[i].titulo + '"?')) { imoveis.splice(i, 1); renderList(); saveToLocal(); } }

    function showForm() { editingId = null; document.getElementById('formTitle').textContent = 'Adicionar Imóvel'; clearForm(); document.getElementById('formSection').classList.add('active'); }
    function hideForm() { document.getElementById('formSection').classList.remove('active'); }
    function clearForm() {
        ['titulo','valor','condominio','iptu','quartos','suites','banheiros','vagas','area','descricao'].forEach(f => document.getElementById('f_' + f).value = '');
        document.getElementById('f_tipo').value = 'venda';
        document.getElementById('imgUrlList').innerHTML = '<div class="img-url-row"><input type="text" class="img-url" placeholder="https://..."><button onclick="removeImg(this)">✕</button></div>';
    }

    function addImageField() {
        const div = document.getElementById('imgUrlList');
        div.insertAdjacentHTML('beforeend', '<div class="img-url-row"><input type="text" class="img-url" placeholder="https://..."><button onclick="removeImg(this)">✕</button></div>');
    }
    function removeImg(btn) { const list = document.getElementById('imgUrlList'); if (list.children.length > 1) btn.parentElement.remove(); else btn.parentElement.querySelector('input').value = ''; }

    function editImovel(i) {
        editingId = i; const im = imoveis[i];
        document.getElementById('formTitle').textContent = 'Editar Imóvel';
        document.getElementById('f_titulo').value = im.titulo || '';
        document.getElementById('f_valor').value = im.valor_venda || '';
        document.getElementById('f_condominio').value = im.condominio || '';
        document.getElementById('f_iptu').value = im.iptu || '';
        document.getElementById('f_quartos').value = im.quartos || '';
        document.getElementById('f_suites').value = im.suites || '';
        document.getElementById('f_banheiros').value = im.banheiros || '';
        document.getElementById('f_vagas').value = im.vagas || '';
        document.getElementById('f_area').value = im.area || '';
        document.getElementById('f_tipo').value = im.tipo || 'venda';
        document.getElementById('f_descricao').value = im.descricao || '';
        const imgList = document.getElementById('imgUrlList'); imgList.innerHTML = '';
        (im.imagens || []).forEach(url => { imgList.insertAdjacentHTML('beforeend', `<div class="img-url-row"><input type="text" class="img-url" value="${url}" placeholder="https://..."><button onclick="removeImg(this)">✕</button></div>`); });
        if (!im.imagens || im.imagens.length === 0) addImageField();
        document.getElementById('formSection').classList.add('active');
    }

    function saveImovel() {
        const titulo = document.getElementById('f_titulo').value.trim();
        if (!titulo) { showToast('Preencha o título', 'error'); return; }
        const imagens = Array.from(document.querySelectorAll('.img-url')).map(i => i.value.trim()).filter(u => u);
        const imovel = {
            id: editingId !== null ? imoveis[editingId].id : Date.now().toString(),
            titulo, valor_venda: document.getElementById('f_valor').value.trim(),
            condominio: document.getElementById('f_condominio').value.trim(),
            iptu: document.getElementById('f_iptu').value.trim(),
            quartos: document.getElementById('f_quartos').value.trim(),
            suites: document.getElementById('f_suites').value.trim(),
            banheiros: document.getElementById('f_banheiros').value.trim(),
            vagas: document.getElementById('f_vagas').value.trim(),
            area: document.getElementById('f_area').value.trim(),
            tipo: document.getElementById('f_tipo').value,
            descricao: document.getElementById('f_descricao').value.trim(),
            imagens, ativo: editingId !== null ? imoveis[editingId].ativo : true
        };
        if (editingId !== null) imoveis[editingId] = imovel; else imoveis.push(imovel);
        renderList(); hideForm(); saveToLocal();
        showToast('Imóvel salvo! Clique em "Baixar e Publicar" para atualizar o site.', 'success');
    }
    </script>
</body>
</html>
